name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
      # The gitleaks GitHub Action requires a paid GITLEAKS_LICENSE for org
      # repos. Run the OSS gitleaks CLI directly instead — identical scan
      # (same rules + .gitleaks.toml allowlist), no license required.
      - name: Run gitleaks (OSS CLI)
        run: |
          VERSION=8.30.0
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks git . --config .gitleaks.toml --no-banner --redact --exit-code 1

  test:
    # ubuntu-latest is free 2-core/7GB. Larger runners (16-cores, etc.) require
    # a provisioned runner pool in repo settings. Falling back to default keeps
    # the matrix shard speedup (~5-6x via parallelism) at zero cost.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - name: Pre-test gates (shard 1 only — they're not test files)
        if: matrix.shard == 1
        run: bun run verify
      - name: Run test shard ${{ matrix.shard }}/4
        run: scripts/test-shard.sh ${{ matrix.shard }} 4
      - name: Run *.serial.test.ts at --max-concurrency=1 (shard 1 only)
        # Serial files share file-wide state (top-level mock.module, module
        # singletons) that leaks across files in the same bun-test process.
        # test-shard.sh excludes them; this step runs them at concurrency=1.
        if: matrix.shard == 1
        run: bun run test:serial

  eval-realcorpus-gate:
    # Real-corpus retrieval QUALITY gate — the search-quality "measurement
    # unlock". Seeds a labeled real-prose corpus (people + company/client pages
    # AND how-to / runbook / integration / decision docs) with FROZEN ZeroEntropy
    # zembed-1 embeddings and runs the production runEval hybrid pipeline,
    # asserting mean nDCG@k + recall floors PLUS a per-band how-to nDCG floor.
    # A ranking regression that buries how-to docs under people pages (the
    # documented source-boost defect) collapses the how-to band and fails CI.
    #
    # This is the primary guardian for src/core/search/** ranking changes. It is
    # also executed inside the `test` job's serial pass; this dedicated job
    # surfaces it as a distinct, named required check so a search-ranking change
    # can't go green without the quality signal being read.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2
        with:
          bun-version: 1.3.13
      - run: bun install
      - name: Run real-corpus retrieval gate (frozen embeddings, hermetic)
        run: bun test --max-concurrency=1 --timeout=120000 test/eval-realcorpus-gate.serial.test.ts
